name: Core CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.14']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            build-essential \
            libpq-dev \
            pkg-config \
            zlib1g-dev \
            libzstd-dev

      - name: Install dependencies
        run: |
          uv venv
          uv pip install setuptools psycopg "antlr4-python3-runtime==4.11.1"
          uv pip install --no-build-isolation -e ".[dev,build,examples,docs]"

      - name: Lint code
        run: .venv/bin/ruff check src tests

      - name: Run unit tests
        run: .venv/bin/pytest -m unit -x

  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            build-essential \
            libpq-dev \
            pkg-config \
            zlib1g-dev \
            libzstd-dev

      - name: Install dependencies
        run: |
          uv venv
          uv pip install setuptools psycopg "antlr4-python3-runtime==4.11.1"
          uv pip install --no-build-isolation -e ".[dev,build,examples,docs]"

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7


